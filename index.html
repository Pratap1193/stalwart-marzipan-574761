<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lime Light Restaurant - Experience premium luxury dining and exquisite culinary artistry." />
    <meta name="keywords" content="restaurant, fine dining, luxury, food, Lime Light, reservation, menu, gallery" />
    <meta name="author" content="Lime Light Restaurant" />
    <meta property="og:title" content="Lime Light Restaurant" />
    <meta property="og:description" content="Experience premium luxury dining and exquisite culinary artistry." />
    <meta property="og:type" content="website" />
    <title>Lime Light Restaurant</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- REQUIRED: Hidden Netlify Forms for SPA detection during build -->
    <!-- This form is NEVER displayed - it's only used by Netlify to detect form fields during deployment -->
    <!-- All fields MUST match the Reservation form in src/pages/Reservation.tsx -->
    <form name="reservation" method="POST" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="date" name="date" />
      <input type="time" name="time" />
      <select name="guests">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="+10">+10</option>
      </select>
      <textarea name="specialRequest"></textarea>
    </form>
  </body>
</html>
